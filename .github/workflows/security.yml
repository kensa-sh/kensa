name: Security

on:
  pull_request:
  push:
    branches: ["main"]
  schedule:
    - cron: "24 3 * * 1"

permissions:
  contents: read
  pull-requests: read

jobs:
  secrets:
    name: Secret scan
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
