name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v7
      - uses: astral-sh/setup-uv@v7
      - run: uv python install ${{ matrix.python-version }}
      - run: uv sync --group dev --python ${{ matrix.python-version }}
      - run: uv run --python ${{ matrix.python-version }} python -m coverage run -m pytest -q -m "not live"
      - run: uv run --python ${{ matrix.python-version }} python -m coverage report

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: astral-sh/setup-uv@v7
      - run: uv python install 3.11
      - run: uv sync --group dev --python 3.11
      - run: uv run ruff check .
      - run: uv run ruff format --check .
      - run: uv run ty check

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: astral-sh/setup-uv@v7
      - run: uv python install 3.11
      - run: uv sync --group dev --python 3.11
      - name: Verify tag matches package version
        run: |
          tag_version="${GITHUB_REF_NAME#v}"
          pkg_version="$(uv version --short)"
          lock_version="$(grep -A1 '^name = "kensa"$' uv.lock | grep -m1 '^version = ' | sed -E 's/^version = "(.*)"$/\1/')"
          echo "tag=$tag_version pyproject=$pkg_version uv.lock=$lock_version"
          if [ "$tag_version" != "$pkg_version" ] || [ "$tag_version" != "$lock_version" ]; then
            echo "::error::tag ($tag_version) does not match pyproject.toml ($pkg_version) / uv.lock ($lock_version)"
            exit 1
          fi
      - run: uv build --out-dir dist
      - uses: actions/upload-artifact@v7
        with:
          name: dist
          path: dist/

  publish:
    needs: [test, lint, build]
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v7
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist
      - name: Publish to PyPI via Trusted Publishing
        uses: pypa/gh-action-pypi-publish@release/v1
      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "${GITHUB_REF_NAME}" dist/* --title "${GITHUB_REF_NAME}" --generate-notes
