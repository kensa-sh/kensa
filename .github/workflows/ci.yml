name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v7
      - uses: astral-sh/setup-uv@v7
      - run: uv python install ${{ matrix.python-version }}
      - run: uv sync --group dev --python ${{ matrix.python-version }}
      - run: uv run --python ${{ matrix.python-version }} python -m coverage run -m pytest -q -m "not live"
      - run: uv run --python ${{ matrix.python-version }} python -m coverage report

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: astral-sh/setup-uv@v7
      - run: uv python install 3.11
      - run: uv sync --group dev --python 3.11
      - run: uv run ruff check .
      - run: uv run ruff format --check .
      - run: uv run ty check

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: astral-sh/setup-uv@v7
      - run: uv python install 3.11
      - run: uv sync --group dev --python 3.11
      - run: uv build

  # Live redaction integration path: real spaCy/Presidio readiness and one redaction
  # pass with en_core_web_sm-3.8.0 only. en_core_web_lg behavior is covered by mocked
  # bootstrap/checksum unit tests.
  redaction-live:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: astral-sh/setup-uv@v7
      - run: uv python install 3.11
      - run: uv sync --group dev --python 3.11
      - run: uv pip install ".[redaction]"
      - run: uv run pytest tests/integration/test_live_redaction.py -q --run-live
