name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v7
      - uses: astral-sh/setup-uv@v7
      - run: uv python install ${{ matrix.python-version }}
      - run: uv sync --group dev --python ${{ matrix.python-version }}
      - run: uv run --python ${{ matrix.python-version }} python -m coverage run -m pytest -q -m "not live"
      - run: uv run --python ${{ matrix.python-version }} python -m coverage report

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: astral-sh/setup-uv@v7
      - run: uv python install 3.11
      - run: uv sync --group dev --python 3.11
      - run: uv run ruff check .
      - run: uv run ruff format --check .
      - run: uv run ty check

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: astral-sh/setup-uv@v7
      - run: uv python install 3.11
      - run: uv sync --group dev --python 3.11
      - run: uv build

  # Run redaction with real spaCy/Presidio dependencies and the pinned small model.
  redaction:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: astral-sh/setup-uv@v7
      - run: uv python install 3.11
      - run: uv sync --group dev --python 3.11
      - run: uv pip install ".[redaction]"
      - run: uv run pytest -q -m "not live"
      - run: uv run pytest tests/integration/test_live_redaction.py -q --run-live

  merge-release:
    if: >-
      github.event_name == 'pull_request' &&
      github.event.pull_request.user.login == 'satyaborg' &&
      github.event.pull_request.head.repo.full_name == github.repository &&
      github.event.pull_request.base.ref == 'main' &&
      startsWith(github.event.pull_request.head.ref, 'chore/release-v') &&
      startsWith(github.event.pull_request.title, 'chore: release ') &&
      github.event.pull_request.draft == false
    needs: [test, lint, build, redaction]
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - name: Merge release PR
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          gh api \
            --method PUT \
            "repos/${GH_REPO}/pulls/${PR_NUMBER}/merge" \
            --field merge_method=merge \
            --field sha="$HEAD_SHA"
